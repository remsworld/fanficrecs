<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pick a Ship!</title>

<style>

html, body {
    height: 100%;
    margin: 0;
}
    
body{
    background: white;
    color: black;
    text-align:center;
    font-family:monospace;
}

    .screen {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: white;
    color: black;
}

.slot-machine {
    display: flex;
    gap: 40px;
    margin-bottom: 40px;
}

.reel {
    width: 200px;
    height: 200px;
    border: 5px solid black;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 90px;
    background: white;
    border-radius: 10px;
}
.reel img{
    width:100%;
    height:100%;
    object-fit:contain;
}

button{
    padding:10px 20px;
    font-size:20px;
    cursor:pointer;
}

    #spinBtn {
    padding: 15px 40px;
    font-size: 24px;
    cursor: pointer;
}

    @media (max-width: 768px) {

    .reel {
        width: 130px;
        height: 130px;
        font-size: 60px;
    }

    .slot-machine {
        gap: 20px;
    }
}

</style>
</head>
<body>

<div class="screen">

    <div class="slot-machine">
        <div class="reel" id="reel1">❔</div>
        <div class="reel" id="reel2">❔</div>
        <div class="reel" id="reel3">❔</div>
    </div>

    <button id="spinBtn">SPIN</button>

</div>

<script src="js/slot.js"></script>

</body>
</html>
