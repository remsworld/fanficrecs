<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Slot Machine</title>

<style>

body{
    background:#111;
    color:white;
    text-align:center;
    font-family:monospace;
}

.slot-machine{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:50px auto;
}

.reel{
    width:150px;
    height:150px;
    border:4px solid white;
    overflow:hidden;
}

.reel img{
    width:100%;
    height:100%;
    object-fit:contain;
}

button{
    padding:10px 20px;
    font-size:20px;
    cursor:pointer;
}

</style>
</head>
<body>

<div class="slot-machine">

    <div class="reel">
        <img id="reel1" src="images/machine1.png">
    </div>

    <div class="reel">
        <img id="reel2" src="images/machine1.png">
    </div>

    <div class="reel">
        <img id="reel3" src="images/machine1.png">
    </div>

</div>

<button id="spinBtn">SPIN</button>

<script src="js/slot.js"></script>

</body>
</html>
