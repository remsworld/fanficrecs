<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Slot Machine</title>

<style>

body{
    background:#111;
    color:white;
    text-align:center;
    font-family:monospace;
}

.slot-machine{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:50px auto;
}

.reel {
    width: 120px;
    height: 120px;
    border: 3px solid white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 60px;
    margin: 10px;
}

.reel img{
    width:100%;
    height:100%;
    object-fit:contain;
}

button{
    padding:10px 20px;
    font-size:20px;
    cursor:pointer;
}

</style>
</head>
<body>

<div class="slot-machine">

    <div class="reel" id="reel1">❔</div>
    <div class="reel" id="reel2">❔</div>
    <div class="reel" id="reel3">❔</div>

</div>

<button id="spinBtn">SPIN</button>

<button id="spinBtn">SPIN</button>

<script src="js/slot.js"></script>

</body>
</html>
